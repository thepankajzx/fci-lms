<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Financial Wellbeing Assessment</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/typography.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <link rel="stylesheet" href="assets/css/animations.css">

  <!-- Chart.js for Data Visualisation -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- JS Files -->
  <script src="config/apiEndpoints.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    window.Auth.requireAuth();
  </script>
</head>
<body>

  <div class="app-layout">
    
    <!-- Sidebar Navigation -->
    <aside class="app-sidebar" id="sidebar">
      <div class="sidebar-header">
        <svg class="logo-icon" viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
        </svg>
        <span class="logo-text">FWB Platform</span>
      </div>
      
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item active">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
          Dashboard
        </a>
        <a href="assessment.html" class="nav-item">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          Assessments
        </a>
        <a href="result.html" class="nav-item">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg>
          My Results
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">U</div>
          <div class="user-details">
            <span class="user-name" id="userName">Loading...</span>
            <span class="user-role" id="userRole">Employee</span>
          </div>
        </div>
        <button id="logoutBtn" class="btn-logout">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          Logout
        </button>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="app-main">
      
      <!-- Top Header -->
      <header class="app-header">
        <button id="mobileMenuBtn" class="mobile-menu-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <h2 class="header-title">Overview</h2>
      </header>

      <!-- Dashboard Content -->
      <div class="app-content">
        
        <div class="welcome-card animate-fade-in-up">
          <div>
            <h1 id="welcomeMessage">Welcome back, User!</h1>
            <p>Here is your current financial wellbeing progress and assigned tasks.</p>
          </div>

          <div class="chart-container" style="background: var(--color-card-bg); border-radius: var(--radius-xl); box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 20px; display: flex; justify-content: center; align-items: center;">
            <div style="width: 150px; height: 150px;">
              <canvas id="progressChart"></canvas>
            </div>
          </div>
        </div>

        <div class="stats-grid animate-fade-in-up" style="animation-delay: 0.1s;">
          <div class="stat-card">
            <div class="stat-title">Assigned Assessments</div>
            <div class="stat-value" id="statAssigned">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-title">Completed</div>
            <div class="stat-value text-success" id="statCompleted">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-title">Pending Tasks</div>
            <div class="stat-value text-warning" id="statPending">-</div>
          </div>
        </div>

        <div class="dashboard-sections grid grid-cols-2 gap-8 animate-fade-in-up" style="animation-delay: 0.2s;">
          <!-- Pending Tasks -->
          <section class="dashboard-section">
            <h3 class="section-title">Pending Assessments</h3>
            <div class="card-list" id="pendingList">
              <div class="skeleton" style="height: 80px; border-radius: var(--radius-md); margin-bottom: 12px;"></div>
              <div class="skeleton" style="height: 80px; border-radius: var(--radius-md);"></div>
            </div>
          </section>

          <!-- Recent Activity -->
          <section class="dashboard-section">
            <h3 class="section-title">Recent Activity</h3>
            <div class="card-list" id="activityList">
               <div class="activity-empty text-center" style="padding: 2rem; color: var(--color-text-tertiary);">
                 No recent activity to show.
               </div>
            </div>
          </section>
        </div>

      </div>
    </main>
  </div>

  <script src="assets/js/dashboard.js"></script>
</body>
</html>
