<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Results - Financial Wellbeing Platform</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/typography.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/result.css">
  <link rel="stylesheet" href="assets/css/animations.css">

  <!-- JS Files -->
  <script src="config/apiEndpoints.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/scoring.js"></script>
  <script src="assets/js/profileEngine.js"></script>
  <script>
    window.Auth.requireAuth();
  </script>
</head>
<body>

  <!-- Top Header -->
  <header class="app-header justify-between">
    <div class="logo-text">FWB Platform</div>
    <a href="dashboard.html" class="btn-sm" style="color:var(--color-text-primary); background-color: var(--color-border-light); text-decoration:none;">Back to Dashboard</a>
  </header>

  <main class="app-main" style="margin-left: 0; align-items: center; padding: var(--spacing-8) 0;">
    <div class="container result-container">
      
      <!-- Score Overview -->
      <section class="score-card animate-fade-in-up">
        <h1 class="result-title">Your Assessment Results</h1>
        <p class="text-tertiary">Financial Confidence Baseline</p>
        
        <div class="score-circle-container">
          <div class="progress-circle huge" id="scoreCircle">
            <span id="scoreValue">--%</span>
          </div>
        </div>

        <h2 class="profile-name" id="profileName">Loading...</h2>
        <p class="profile-desc" id="profileDesc">Calculating your tailored profile...</p>
      </section>

      <!-- Recommendations -->
      <section class="recommendations-section animate-fade-in-up" style="animation-delay: 0.2s;">
        <h3 class="section-title">Personalised Recommendations</h3>
        <p class="text-secondary" style="margin-bottom: var(--spacing-6);">Based on your responses, here are your next best steps.</p>
        
        <div class="recommendation-list" id="recsList">
          <!-- Dynamically injected -->
          <div class="skeleton" style="height: 100px; border-radius: var(--radius-md); margin-bottom: 12px;"></div>
        </div>
      </section>

      <!-- Action Buttons -->
      <div class="action-buttons animate-fade-in-up" style="animation-delay: 0.3s; display: flex; justify-content: center; gap: var(--spacing-4); margin-top: var(--spacing-8);">
        <button class="btn-primary" onclick="window.print()">Download PDF Report</button>
        <a href="dashboard.html" class="btn-secondary" style="text-decoration:none;">Return to Dashboard</a>
      </div>

    </div>
  </main>

  <script src="assets/js/result.js"></script>
</body>
</html>
